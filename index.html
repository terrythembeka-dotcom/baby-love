<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Come Back to Daddy?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #ffc0cb, #ffb6d9, #ff69b4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Question Page Styles */
        .question-page {
            text-align: center;
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .question-page.hidden {
            display: none;
        }

        .question {
            font-size: 3em;
            color: #fff;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            animation: fadeIn 1s ease-in;
        }

        .buttons-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100px;
        }

        .yes-btn {
            padding: 20px 50px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 20;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .yes-btn:active {
            transform: scale(0.95);
        }

        .no-btn {
            padding: 20px 50px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #f44336, #da190b);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: not-allowed;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: absolute;
            transition: all 0.1s;
            user-select: none;
            pointer-events: auto;
        }

        .no-btn:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* Calendar Page Styles */
        .calendar-page {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .calendar-page.active {
            display: flex;
        }

        .calendar-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .calendar-title {
            text-align: center;
            color: #ff1493;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .calendar-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .email-info {
            background: #ffe0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #333;
        }

        .success-message {
            display: none;
            background: #4CAF50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .date-input {
            display: grid;
            gap: 20px;
        }

        .date-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .date-field label {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .date-field input,
        .date-field textarea {
            padding: 15px;
            font-size: 1em;
            border: 2px solid #ffb6d9;
            border-radius: 10px;
            transition: border-color 0.3s;
            font-family: Arial;
        }

        .date-field input:focus,
        .date-field textarea:focus {
            outline: none;
            border-color: #ff1493;
        }

        .date-field textarea {
            min-height: 100px;
            resize: vertical;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reserve-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .reserve-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .reserve-btn:active {
            transform: scale(0.95);
        }

        .back-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            background: #ccc;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .back-btn:hover {
            background: #bbb;
            transform: scale(1.05);
        }

        /* Popup Styles */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popAnimation {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease-in;
        }

        .popup-overlay.active {
            display: flex;
        }

        .popup-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: popAnimation 0.8s ease-out;
            max-width: 500px;
        }

        .bunny-bear {
            font-size: 8em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .popup-text {
            font-size: 2em;
            color: #ff1493;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .countdown {
            font-size: 1.2em;
            color: #555;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .question {
                font-size: 2em;
            }

            .buttons-container {
                flex-direction: column;
                gap: 20px;
            }

            .no-btn {
                position: relative;
            }

            .calendar-container {
                padding: 20px;
            }

            .calendar-title {
                font-size: 1.8em;
            }

            .buttons {
                flex-direction: column;
            }

            .reserve-btn,
            .back-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Question Page -->
    <div class="question-page" id="questionPage">
        <div class="question">Will you come back to daddy? 💕</div>
        <div class="buttons-container">
            <button class="yes-btn" onclick="handleYes()">Yes! 💚</button>
            <button class="no-btn" id="noBtn">I still need time baby 💔</button>
        </div>
    </div>

    <!-- Calendar Page -->
    <div class="calendar-page" id="calendarPage">
        <div class="calendar-container">
            <h1 class="calendar-title">❤️ Date Night Reservation</h1>
            <p class="calendar-subtitle">Pick a special day for us</p>

            <div class="email-info">
                📧 Reminders will be sent to terrythembeka@gmail.com and amophaedi27@gmail.com
            </div>

            <div class="success-message" id="successMessage">
                ✅ Reservation confirmed! Reminders have been sent.
            </div>

            <div class="date-input">
                <div class="date-field">
                    <label for="reservationDate">📅 Choose Your Date:</label>
                    <input type="date" id="reservationDate" required>
                </div>

                <div class="date-field">
                    <label for="reservationTime">🕐 Choose Your Time:</label>
                    <input type="time" id="reservationTime" required>
                </div>

                <div class="date-field">
                    <label for="location">📍 Where would you like to go?</label>
                    <input type="text" id="location" placeholder="Restaurant, park, movie theater..." required>
                </div>

                <div class="date-field">
                    <label for="notes">💌 A special message:</label>
                    <textarea id="notes" placeholder="Write something special..."></textarea>
                </div>
            </div>

            <div class="buttons">
                <button class="reserve-btn" onclick="submitReservation()">Reserve This Date 💕</button>
                <button class="back-btn" onclick="goBackToQuestion()">Go Back</button>
            </div>
        </div>
    </div>

    <!-- Popup Overlay -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            <div class="bunny-bear">🐰🌹</div>
            <div class="popup-text">Thank you ❤️ Nkosazana!</div>
            <button class="reserve-btn" onclick="proceedToCalendar()" style="margin-top: 20px;">Proceed to Calendar 📅</button>
            <div class="countdown">Redirecting in <span id="countdown">10</span> seconds...</div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const popupOverlay = document.getElementById('popupOverlay');
        const questionPage = document.getElementById('questionPage');
        const calendarPage = document.getElementById('calendarPage');
        let countdownInterval = null;

        function getRandomPosition() {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            let x = Math.random() * maxX;
            let y = Math.random() * maxY;
            
            // Avoid spawning behind buttons area
            if (y > window.innerHeight * 0.4 && y < window.innerHeight * 0.7 && x > window.innerWidth * 0.3 && x < window.innerWidth * 0.7) {
                y = window.innerHeight * 0.8;
            }
            
            return { x, y };
        }

        function moveNoButton() {
            const pos = getRandomPosition();
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top = pos.y + 'px';
        }

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        // Aggressively move the button if cursor gets close
        document.addEventListener('mousemove', (e) => {
            const rect = noBtn.getBoundingClientRect();
            const distance = Math.sqrt(
                Math.pow(e.clientX - (rect.left + rect.width / 2), 2) +
                Math.pow(e.clientY - (rect.top + rect.height / 2), 2)
            );

            if (distance < 150) {
                moveNoButton();
            }
        });

        function handleYes() {
            popupOverlay.classList.add('active');
            startCountdown();
        }

        function startCountdown() {
            let seconds = 10;
            const countdownEl = document.getElementById('countdown');
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    proceedToCalendar();
                }
            }, 1000);
        }

        function proceedToCalendar() {
            if (countdownInterval) clearInterval(countdownInterval);
            popupOverlay.classList.remove('active');
            questionPage.classList.add('hidden');
            calendarPage.classList.add('active');
            initializeCalendarPage();
        }

        function goBackToQuestion() {
            calendarPage.classList.remove('active');
            questionPage.classList.remove('hidden');
            resetForm();
            moveNoButton();
        }

        function initializeCalendarPage() {
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('reservationDate');
            dateInput.min = today;
            dateInput.valueAsDate = new Date();
        }

        function resetForm() {
            document.getElementById('reservationDate').value = '';
            document.getElementById('reservationTime').value = '';
            document.getElementById('location').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('successMessage').style.display = 'none';
        }

        async function submitReservation() {
            const date = document.getElementById('reservationDate').value;
            const time = document.getElementById('reservationTime').value;
            const location = document.getElementById('location').value;
            const notes = document.getElementById('notes').value;

            if (!date || !time || !location) {
                alert('Please fill in all required fields 💕');
                return;
            }

            try {
                // Send to email service using Formspree
                const response = await fetch('https://formspree.io/f/mwazrwey', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        to_emails: ['terrythembeka@gmail.com', 'amophaedi27@gmail.com'],
                        reservation_date: date,
                        reservation_time: time,
                        location: location,
                        notes: notes,
                        subject: '❤️ Date Night Reservation Confirmed! - Will you come back to daddy?'
                    })
                });

                if (response.ok) {
                    showSuccessMessage();
                    setTimeout(() => {
                        alert('Our date night is set! 🌹 See you soon!');
                    }, 1500);
                } else {
                    console.log('Reservation saved locally:', { date, time, location, notes });
                    showSuccessMessage();
                    setTimeout(() => {
                        alert('Date night reserved! 🌹 See you soon!');
                    }, 1500);
                }
            } catch (error) {
                console.error('Error:', error);
                showSuccessMessage();
                setTimeout(() => {
                    alert('Date night reserved! 🌹 See you soon!');
                }, 1500);
            }
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        // Initial random position for no button
        window.addEventListener('load', () => {
            moveNoButton();
            initializeCalendarPage();
        });

        // Reposition no button on window resize
        window.addEventListener('resize', moveNoButton);
    </script>
</body>
</html>
