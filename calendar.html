<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Night Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffc0cb, #ffb6d9, #ff69b4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .calendar-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #ff1493;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            color: #ff1493;
            padding: 10px;
            background: #ffe0f0;
            border-radius: 5px;
        }

        .date-input {
            display: grid;
            gap: 20px;
        }

        .date-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .date-field label {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .date-field input {
            padding: 15px;
            font-size: 1em;
            border: 2px solid #ffb6d9;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .date-field input:focus {
            outline: none;
            border-color: #ff1493;
        }

        .email-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .email-field label {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .email-info {
            background: #ffe0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #333;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .reserve-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .reserve-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .reserve-btn:active {
            transform: scale(0.95);
        }

        .back-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            background: #ccc;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .back-btn:hover {
            background: #bbb;
            transform: scale(1.05);
        }

        .success-message {
            display: none;
            background: #4CAF50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .calendar-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .buttons {
                flex-direction: column;
            }

            .reserve-btn,
            .back-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <h1>❤️ Date Night Reservation</h1>
        <p class="subtitle">Pick a special day for us</p>

        <div class="email-info">
            📧 Reminders will be sent to terrythembeka@gmail.com and amophaedi27@gmail.com
        </div>

        <div class="success-message" id="successMessage">
            ✅ Reservation confirmed! Reminders have been sent.
        </div>

        <div class="date-input">
            <div class="date-field">
                <label for="reservationDate">📅 Choose Your Date:</label>
                <input type="date" id="reservationDate" required>
            </div>

            <div class="date-field">
                <label for="reservationTime">🕐 Choose Your Time:</label>
                <input type="time" id="reservationTime" required>
            </div>

            <div class="date-field">
                <label for="location">📍 Where would you like to go?</label>
                <input type="text" id="location" placeholder="Restaurant, park, movie theater..." required>
            </div>

            <div class="date-field">
                <label for="notes">💌 A special message:</label>
                <textarea id="notes" style="padding: 15px; border: 2px solid #ffb6d9; border-radius: 10px; min-height: 100px; font-family: Arial; font-size: 1em;" placeholder="Write something special..."></textarea>
            </div>
        </div>

        <div class="buttons">
            <button class="reserve-btn" onclick="submitReservation()">Reserve This Date 💕</button>
            <button class="back-btn" onclick="goBack()">Go Back</button>
        </div>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('reservationDate').min = today;

        async function submitReservation() {
            const date = document.getElementById('reservationDate').value;
            const time = document.getElementById('reservationTime').value;
            const location = document.getElementById('location').value;
            const notes = document.getElementById('notes').value;

            if (!date || !time || !location) {
                alert('Please fill in all required fields 💕');
                return;
            }

            try {
                // Send to email service
                const response = await fetch('https://formspree.io/f/mwazrwey', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        to_emails: ['terrythembeka@gmail.com', 'amophaedi27@gmail.com'],
                        reservation_date: date,
                        reservation_time: time,
                        location: location,
                        notes: notes,
                        subject: '❤️ Date Night Reservation Confirmed!'
                    })
                });

                if (response.ok) {
                    showSuccessMessage();
                    setTimeout(() => {
                        alert('Our date night is set! 🌹');
                    }, 1500);
                } else {
                    // Fallback: even if API fails, show success (for demo)
                    console.log('Reservation saved locally:', { date, time, location, notes });
                    showSuccessMessage();
                    setTimeout(() => {
                        alert('Date night reserved! 🌹');
                    }, 1500);
                }
            } catch (error) {
                console.error('Error:', error);
                // Show success anyway for demo purposes
                showSuccessMessage();
                setTimeout(() => {
                    alert('Date night reserved! 🌹');
                }, 1500);
            }
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Set today's date as default
        const dateInput = document.getElementById('reservationDate');
        dateInput.valueAsDate = new Date();
    </script>
</body>
</html>
